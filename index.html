<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PH Channel Bet Controller</title>

  <style>
    body {
      background: #121212;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    #floatingQuickPanel {
      background: #282f46;
      border-radius: 16px;
      padding: 24px;
      width: 560px;
      font-family: 'Khmer OS Battambang', sans-serif;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .btn {
      padding: 18px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      border: none;
      cursor: pointer;
    }

    .btn-start {
      background: #4caf50;
      color: white;
      width: 100%;
      margin-bottom: 16px;
    }

    .target-box {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      padding: 18px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 30px;
      font-weight: bold;
      font-size: 18px;
    }

    .quick-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .quick-checkboxes label {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 14px;
      color: #ddd;
      width: 65px;
    }

    .quick-checkboxes input {
      width: 30px;
      height: 30px;
      margin-bottom: 5px;
    }

    .limit-mode-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    #maxSpamInput {
      width: 90px;
      height: 28px;
      font-size: 18px;
    }

    .mode-switch-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 55px;
      height: 30px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      cursor: pointer;
      background: #888;
      border-radius: 30px;
      transition: .3s;
    }

    .slider:before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: .3s;
    }

    .switch input:checked + .slider {
      background: #28a745;
    }

    .switch input:checked + .slider:before {
      transform: translateX(25px);
    }

    #channelStatusLabel,
    #fightStatusLabel {
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      margin-top: 14px;
    }

    .quick-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .quick-actions button {
      flex: 1;
      height: 70px;
      font-size: 18px;
    }

    .btn-meron {
      background: #ff4d4f;
      color: white;
    }

    .btn-wala {
      background: #1890ff;
      color: white;
    }

    .btn-stop {
      background: #ffc107;
      color: black;
      width: 100%;
      margin-top: 14px;
      height: 65px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div id="floatingQuickPanel">

  <button class="btn btn-start" id="startBtn">
    ▶️ Start PH Automation
  </button>

  <div class="target-box">
    Target Channel: <span id="targetChannelText">PH</span>
  </div>

  <div class="quick-checkboxes" id="amountCheckboxes"></div>

  <div class="limit-mode-row">
    <input type="number" id="maxSpamInput" value="3" />

    <div class="mode-switch-wrapper">
      <span>Mode:</span>
      <label class="switch">
        <input type="checkbox" id="modeSwitch">
        <span class="slider"></span>
      </label>
      <span id="modeLabel">Test</span>
    </div>
  </div>

  <div id="channelStatusLabel">PH Tabs: 0</div>
  <div id="fightStatusLabel">Status: UNKNOWN</div>

  <div class="quick-actions">
    <button class="btn btn-meron" id="spamMeron">Spam Meron PH</button>
    <button class="btn btn-wala" id="spamWala">Spam Wala PH</button>
  </div>

  <button class="btn btn-stop" id="stopBtnBottom">🛑 Stop</button>

</div>

<script>
  const TARGET_CHANNEL = "PH";

  const urls = [
    "https://aamm24.win/#",
    "https://sa24.app/#"
  ];

  const checkboxContainer = document.getElementById("amountCheckboxes");
  const modeSwitch = document.getElementById("modeSwitch");
  const modeLabel = document.getElementById("modeLabel");
  const maxSpamInput = document.getElementById("maxSpamInput");
  const statusLabel = document.getElementById("fightStatusLabel");
  const channelStatusLabel = document.getElementById("channelStatusLabel");

  const khrAmounts = [
    { value: 5000, label: "៥ពាន់" },
    { value: 10000, label: "១មឺន" },
    { value: 15000, label: "១មឺន5ពាន់" },
    { value: 20000, label: "២មឺន" },
    { value: 50000, label: "៥មុឺន" },
    { value: 100000, label: "១០មុឺន" },
    { value: 200000, label: "២០មុឺន" }
  ];

  let retryLoop = null;
  let openedTabs = [];
  let previousStatus = "UNKNOWN";

  function initUI() {
    checkboxContainer.innerHTML = "";

    khrAmounts.forEach(({ value, label }, i) => {
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.id = `chk_${i}`;
      cb.value = value;

      const lbl = document.createElement("label");
      lbl.appendChild(cb);
      lbl.append(label);

      checkboxContainer.appendChild(lbl);
    });

    updateModeUI();
  }

  function updateModeUI() {
    const isReal = modeSwitch.checked;

    modeLabel.textContent = isReal ? "Real" : "Test";
    maxSpamInput.value = isReal ? 200 : 3;

    const indexes = isReal ? [1, 2, 3, 4, 5, 6] : [0];

    document.querySelectorAll("#amountCheckboxes input").forEach(cb => {
      cb.checked = false;
    });

    indexes.forEach(i => {
      const cb = document.getElementById(`chk_${i}`);
      if (cb) cb.checked = true;
    });
  }

  function getTargetTabs() {
    return openedTabs.filter(item => {
      return item.channel &&
        item.channel.toUpperCase() === TARGET_CHANNEL;
    });
  }

  function updateChannelLabel() {
    const phTabs = getTargetTabs();

    channelStatusLabel.textContent = `${TARGET_CHANNEL} Tabs: ${phTabs.length}`;
    channelStatusLabel.style.color = phTabs.length > 0 ? "#00ff00" : "#ffcc00";
  }

  function stopSpam() {
    if (retryLoop) clearInterval(retryLoop);

    retryLoop = null;
    window._spamLoop = null;
  }

  function startAutomation() {
    console.log("✅ Start button clicked");

    openedTabs = [];

    urls.forEach((url, index) => {
      const tab = window.open(url, "_blank");

      if (!tab) {
        alert("Popup blocked! Please allow popups for this website.");
        return;
      }

      openedTabs.push({
        id: index,
        tab: tab,
        url: url,
        channel: null,
        status: "UNKNOWN"
      });

      setTimeout(() => {
        try {
          tab.postMessage({
            type: "INIT_WATCHER",
            targetChannel: TARGET_CHANNEL
          }, "*");

          console.log("✅ INIT_WATCHER sent:", url);
        } catch (e) {
          console.warn("Cannot send INIT_WATCHER:", e);
        }
      }, 3000);
    });

    updateChannelLabel();
  }

  function spam(side) {
    stopSpam();

    const rawStatus = (localStorage.getItem("AUTO_FIGHT_STATUS") || "").toLowerCase();

    if (rawStatus.includes("closed") || rawStatus.includes("បិទ")) {
      alert("⚠️ Fight is CLOSED.");
      return;
    }

    const targetTabs = getTargetTabs();

    if (targetTabs.length === 0) {
      alert("No PH channel tab detected. Click/select PH inside betting tab first.");
      return;
    }

    const selected = [...document.querySelectorAll("#amountCheckboxes input:checked")]
      .map(cb => parseInt(cb.value))
      .filter(v => !isNaN(v));

    if (selected.length === 0) {
      alert("Please select amount.");
      return;
    }

    const limit = parseInt(maxSpamInput.value || "3");
    const isReal = modeSwitch.checked;
    let count = 0;

    retryLoop = window._spamLoop = setInterval(() => {
      const currentStatus = (localStorage.getItem("AUTO_FIGHT_STATUS") || "").toLowerCase();

      if (currentStatus.includes("closed") || currentStatus.includes("បិទ")) {
        stopSpam();
        return;
      }

      const randAmount = selected[Math.floor(Math.random() * selected.length)];

      const payload = {
        type: "SEND_BET_COMMAND",
        channel: TARGET_CHANNEL,
        side: side,
        amount: randAmount,
        mode: isReal ? "real" : "test"
      };

      console.log(`🔁 PH ${side} [${count + 1}/${limit}]`, payload);

      targetTabs.forEach(({ tab }) => {
        try {
          tab.postMessage(payload, "*");
        } catch (e) {
          console.warn("Cannot send command:", e);
        }
      });

      count++;

      statusLabel.textContent = `Status: ${currentStatus.toUpperCase()} | Sent: ${count}/${limit}`;

      if (count >= limit) {
        stopSpam();
      }

    }, isReal ? 75 : 0);
  }

  window.addEventListener("message", function (event) {
    const data = event.data;

    if (!data || typeof data !== "object") return;

    if (data.type === "CHANNEL_SELECTED" || data.type === "CHANNEL_INFO") {
      const channel = String(data.channel || "").trim().toUpperCase();

      const found = openedTabs.find(item => item.tab === event.source);

      if (found) {
        found.channel = channel;
        console.log("✅ Tab channel detected:", channel);
      }

      updateChannelLabel();
    }

    if (data.type === "STATUS_UPDATE" && data.status) {
      localStorage.setItem("AUTO_FIGHT_STATUS", data.status);

      const found = openedTabs.find(item => item.tab === event.source);
      if (found) found.status = data.status;
    }
  });

  setInterval(() => {
    const rawStatus = (localStorage.getItem("AUTO_FIGHT_STATUS") || "UNKNOWN").trim();
    const lower = rawStatus.toLowerCase();

    let color = "#ffd700";

    if (lower.includes("open") || lower.includes("បើក")) {
      color = "#00ff00";
      previousStatus = "open";
    }

    if (lower.includes("closed") || lower.includes("បិទ")) {
      color = "#ff3b3b";

      if (previousStatus !== "closed") {
        previousStatus = "closed";
        stopSpam();

        if (modeSwitch.checked) {
          modeSwitch.checked = false;
          updateModeUI();
        }
      }
    }

    statusLabel.textContent = `Status: ${rawStatus.toUpperCase()}`;
    statusLabel.style.color = color;

    updateChannelLabel();
  }, 1000);

  document.addEventListener("DOMContentLoaded", function () {
    initUI();

    document.getElementById("startBtn").addEventListener("click", startAutomation);
    document.getElementById("spamMeron").addEventListener("click", () => spam("MERON"));
    document.getElementById("spamWala").addEventListener("click", () => spam("WALA"));
    document.getElementById("stopBtnBottom").addEventListener("click", stopSpam);
    modeSwitch.addEventListener("change", updateModeUI);

    console.log("✅ Controller ready");
  });
</script>

</body>
</html>
