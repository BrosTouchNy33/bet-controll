<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PH Channel Bet Controller</title>

  <style>
    body {
      background: #121212;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    #floatingQuickPanel {
      background: #282f46;
      border-radius: 16px;
      padding: 24px;
      width: 560px;
      font-family: 'Khmer OS Battambang', sans-serif;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .quick-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .quick-checkboxes label {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 14px;
      color: #ccc;
      width: 60px;
      margin: 2px;
    }

    .quick-checkboxes input[type="checkbox"] {
      margin-top: 4px;
      width: 32px;
      height: 32px;
      transform: scale(1.2);
    }

    .limit-mode-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 10px;
    }

    .btn {
      padding: 18px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      border: none;
      cursor: pointer;
      flex: 1;
    }

    .btn-start {
      background: #4caf50;
      color: white;
      width: 100%;
      margin-bottom: 16px;
    }

    .btn-meron {
      background: #ff4d4f;
      color: white;
    }

    .btn-wala {
      background: #1890ff;
      color: white;
    }

    .btn-stop {
      background: #ffc107;
      color: black;
      width: 100%;
      margin-top: 12px;
    }

    .mode-switch-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #888;
      transition: 0.4s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }

    .switch input:checked + .slider {
      background-color: #28a745;
    }

    .switch input:checked + .slider:before {
      transform: translateX(26px);
    }

    #fightStatusLabel,
    #channelStatusLabel {
      margin-top: 12px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    .target-box {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 16px;
      font-weight: bold;
    }

    .quick-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="floatingQuickPanel">
  <button class="btn btn-start" id="startBtn">▶️ Start PH Automation</button>

  <div class="target-box">
    Target Channel: <span id="targetChannelText">PH</span>
  </div>

  <div class="quick-checkboxes" id="amountCheckboxes"></div>

  <div class="limit-mode-row">
    <input
      type="number"
      id="maxSpamInput"
      placeholder="Max Spam"
      value="3"
      style="width: 90px;"
    />

    <div class="mode-switch-wrapper">
      <span class="label">Mode:</span>
      <label class="switch">
        <input type="checkbox" id="modeSwitch" />
        <span class="slider"></span>
      </label>
      <span id="modeLabel">Test</span>
    </div>
  </div>

  <div id="channelStatusLabel">PH Tabs: 0</div>
  <div id="fightStatusLabel">Status: UNKNOWN</div>

  <div class="quick-actions">
    <button class="btn btn-meron" id="spamMeron">Spam Meron PH</button>
    <button class="btn btn-wala" id="spamWala">Spam Wala PH</button>
  </div>

  <button class="btn btn-stop" id="stopBtnBottom">🛑 Stop</button>
</div>

<script>
(function () {
  let lastChannel = null;

  function getCurrentChannel() {
    const active = document.querySelector(".btn-channel.active");
    if (!active) return null;

    return (
      active.getAttribute("data-name") ||
      active.dataset.name ||
      active.innerText.trim()
    );
  }

  function sendChannelInfo(type = "CHANNEL_INFO") {
    const channel = getCurrentChannel();
    if (!channel) return;

    if (channel !== lastChannel || type === "CHANNEL_SELECTED") {
      lastChannel = channel;

      console.log("✅ Current channel:", channel);

      if (window.opener) {
        window.opener.postMessage({
          type: type,
          channel: channel
        }, "*");
      }
    }
  }

  // Detect when user clicks channel
  document.addEventListener("click", function (e) {
    const btn = e.target.closest(".btn-channel");
    if (!btn) return;

    const channel = btn.getAttribute("data-name") || btn.dataset.name;

    if (channel) {
      lastChannel = channel;

      console.log("✅ Clicked channel:", channel);

      if (window.opener) {
        window.opener.postMessage({
          type: "CHANNEL_SELECTED",
          channel: channel
        }, "*");
      }
    }

    setTimeout(() => {
      sendChannelInfo("CHANNEL_INFO");
    }, 500);
  });

  // Auto check active channel every second
  setInterval(() => {
    sendChannelInfo("CHANNEL_INFO");
  }, 1000);

  // Listen from controller
  window.addEventListener("message", function (event) {
    const data = event.data;
    if (!data || typeof data !== "object") return;

    if (data.type === "INIT_WATCHER") {
      console.log("✅ Watcher initialized");
      sendChannelInfo("CHANNEL_INFO");
    }

    if (data.type === "SEND_BET_COMMAND") {
      const currentChannel = getCurrentChannel();

      if (!currentChannel) {
        console.warn("No active channel found");
        return;
      }

      if (
        data.channel &&
        data.channel.toUpperCase() !== currentChannel.toUpperCase()
      ) {
        console.warn("Skip command. Current:", currentChannel, "Target:", data.channel);
        return;
      }

      console.log("🎯 Bet command received:", data);

      /*
        PUT YOUR REAL BET CLICK CODE HERE

        data.side   = MERON / WALA
        data.amount = 5000 / 10000 / etc
        data.mode   = test / real
      */
    }
  });

  // First run
  setTimeout(() => {
    sendChannelInfo("CHANNEL_INFO");
  }, 1000);
})();
</script>

</body>
</html>
